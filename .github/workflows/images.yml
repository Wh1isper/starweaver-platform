name: Container Images

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".github/workflows/images.yml"
  schedule:
    - cron: "17 18 * * *"
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Image channel to publish."
        required: true
        type: choice
        options:
          - nightly
          - release
      release_tag:
        description: "Release tag to publish when channel is release, for example v0.1.0."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: container-images-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: starweaver-gateway
  GCR_REGISTRY: ${{ vars.GCR_REGISTRY || 'gcr.io' }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}

jobs:
  gateway-smoke:
    name: Gateway image smoke build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/starweaver-gateway/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          pull: true
          tags: starweaver-gateway:pr-${{ github.sha }}
          cache-from: type=gha,scope=starweaver-gateway
          cache-to: type=gha,scope=starweaver-gateway,mode=max

      - name: Run gateway image smoke
        run: |
          set -euo pipefail
          container_id="$(
            docker run \
              --detach \
              --publish 18080:8080 \
              --env STARWEAVER_GATEWAY_LISTEN_ADDR=0.0.0.0:8080 \
              starweaver-gateway:pr-${GITHUB_SHA}
          )"
          trap 'docker logs "${container_id}" || true; docker rm -f "${container_id}" || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/readyz; then
              exit 0
            fi
            sleep 2
          done
          exit 1

  gateway-nightly:
    name: Publish gateway nightly image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.channel == 'nightly')
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate registry settings
        run: |
          set -euo pipefail
          : "${GCR_REGISTRY:?Set GCR_REGISTRY or use the default gcr.io.}"
          : "${GCP_PROJECT_ID:?Set GCP_PROJECT_ID as a repository variable or secret.}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to GCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          build_date="$(date -u +%Y%m%d)"
          image="${GCR_REGISTRY}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:nightly"
            echo "${image}:nightly-${build_date}-${short_sha}"
            echo "${image}:main-${short_sha}"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=${IMAGE_NAME}"
            echo "org.opencontainers.image.revision=${revision}"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=nightly"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push gateway image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/starweaver-gateway/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=starweaver-gateway
          cache-to: type=gha,scope=starweaver-gateway,mode=max

      - name: Write publish summary
        run: |
          {
            echo "Published ${IMAGE_NAME} nightly image."
            echo ""
            echo "Image: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"
            echo ""
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}'
          } >> "${GITHUB_STEP_SUMMARY}"

  gateway-release:
    name: Publish gateway release image
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.channel == 'release')
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "release_tag is required for manual release publishes." >&2
            exit 2
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must look like v0.1.0 or v0.1.0-rc.1: ${RELEASE_TAG}" >&2
            exit 2
          fi

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate registry settings
        run: |
          set -euo pipefail
          : "${GCR_REGISTRY:?Set GCR_REGISTRY or use the default gcr.io.}"
          : "${GCP_PROJECT_ID:?Set GCP_PROJECT_ID as a repository variable or secret.}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to GCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          semver="${RELEASE_TAG#v}"
          image="${GCR_REGISTRY}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${RELEASE_TAG}"
            echo "${image}:${semver}"
            echo "${image}:latest"
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=${IMAGE_NAME}"
            echo "org.opencontainers.image.revision=${revision}"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.version=${RELEASE_TAG}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push gateway image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/starweaver-gateway/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=starweaver-gateway
          cache-to: type=gha,scope=starweaver-gateway,mode=max

      - name: Write publish summary
        run: |
          {
            echo "Published ${IMAGE_NAME} release image."
            echo ""
            echo "Image: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"
            echo ""
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}'
          } >> "${GITHUB_STEP_SUMMARY}"
