name: Docs

on:
  pull_request:
    paths:
      - "book.toml"
      - "docs/**"
      - "xtask/**"
      - ".github/workflows/docs.yml"
      - "Makefile"
  push:
    branches: [main]
    paths:
      - "book.toml"
      - "docs/**"
      - "xtask/**"
      - ".github/workflows/docs.yml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.3

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check docs
        run: make docs-check

      - name: Build docs site
        run: make docs-build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: book
          if-no-files-found: error

  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: docs
      url: https://starweaver-platform-docs.pages.dev
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: book

      - name: Install Wrangler
        run: npm install --global wrangler@3.90.0

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if wrangler pages project list | grep -q 'starweaver-platform-docs'; then
            echo "Cloudflare Pages project already exists"
          else
            wrangler pages project create starweaver-platform-docs --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy book --project-name=starweaver-platform-docs --branch=main
